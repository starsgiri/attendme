<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account - Presence</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #161e31 100%);
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --input-border: #334155;
            --icon-bg: #2b3b55;
            --primary-btn: #84ff73;
            --primary-btn-text: #0f172a;
            --primary-btn-hover: #71e860;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --card-border: #cbd5e1;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f1f5f9;
            --input-border: #cbd5e1;
            --icon-bg: #e0e7ff;
            --primary-btn: #4ade80;
            --primary-btn-text: #0f172a;
            --primary-btn-hover: #22c55e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .card { 
            background: var(--card-bg); 
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            max-width: 480px; width: 100%; 
            box-sizing: border-box;
            border: 1px solid var(--card-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .header-icon {
            background: var(--icon-bg); width: 48px; height: 48px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 1.5rem;
            transition: background 0.3s;
        }
        .header-icon svg { width: 24px; height: 24px; fill: #818cf8; }
        h2 { 
            text-align: center; margin: 0 0 0.5rem; 
            font-weight: 800; font-size: 1.8rem; line-height: 1.2;
        }
        p.subtitle { 
            text-align: center; color: var(--text-muted); 
            font-size: 0.75rem; letter-spacing: 1px; 
            text-transform: uppercase; margin-bottom: 2rem; font-weight: 600;
        }
        
        .form-group { margin-bottom: 1.2rem; flex: 1; position: relative; }
        
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        
        .input-wrapper { position: relative; }
        input[type="text"], input[type="password"] { 
            width: 100%; padding: 12px 15px; 
            background: var(--input-bg); border: 1px solid var(--input-border); 
            color: var(--text-color); border-radius: 8px; box-sizing: border-box;
            font-size: 0.95rem; outline: none; transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #6366f1; }
        input::placeholder { color: var(--text-muted); opacity: 0.7; }
        
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        
        .security-bar { display: flex; gap: 5px; margin-top: 8px; margin-bottom: 4px; }
        .bar { height: 4px; border-radius: 2px; flex: 1; background: var(--input-border); }
        .bar.active { background: #4ade80; }
        .security-text { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin: 1.5rem 0; font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; }
        .checkbox-group input { appearance: none; width: 16px; height: 16px; border: 1px solid var(--text-muted); border-radius: 4px; background: var(--input-bg); margin-top: 2px; cursor: pointer; flex-shrink: 0; }
        .checkbox-group input:checked { background: #6366f1; border-color: #6366f1; }
        .checkbox-group a { color: #818cf8; text-decoration: none; font-weight: 600; }
        
        button[type="submit"] { 
            background: var(--primary-btn); color: var(--primary-btn-text); 
            border: none; padding: 14px 15px; cursor: pointer; 
            border-radius: 30px; font-weight: 800; font-size: 1rem; 
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        button[type="submit"]:hover { background: var(--primary-btn-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); }
        
        .footer { 
            margin-top: 2rem; text-align: center; font-size: 0.85rem; color: var(--text-muted);
            border-top: 1px solid var(--card-border); padding-top: 1.5rem;
            transition: border-color 0.3s;
        }
        .footer .logo { font-weight: 800; font-size: 1.2rem; color: var(--text-color); margin-bottom: 0.5rem; display: block; transition: color 0.3s; }
        .footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
        
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; }
        .alert-error { background-color: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
    <div class="card">
        <div class="header-icon">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.67-2.93 9.07-7 10.18-4.07-1.11-7-5.51-7-10.18V6.3l7-3.12zm0 2.32c-2.48 0-4.5 2.02-4.5 4.5S9.52 14.5 12 14.5 16.5 12.48 16.5 10 14.48 5.5 12 5.5zm0 1.5c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm-5.5 8.16v1.17c0 1.15 3.01 1.67 5.5 1.67s5.5-.52 5.5-1.67v-1.17c-1.57 1.16-3.39 1.67-5.5 1.67s-3.93-.51-5.5-1.67z"/></svg>
        </div>
        <h2>Create Your Presence Admin Account</h2>
        <p class="subtitle">ENTER SYSTEM CREDENTIALS TO INITIALIZE ACCESS</p>
        
        <div th:if="${error}" class="alert alert-error" th:text="${error}">Error creating account.</div>
        
        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label for="username">USERNAME</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="admin_user" required>
                    <span class="input-icon">@</span>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">SYSTEM PASSWORD</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                    <span class="input-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></span>
                </div>
                <div class="security-bar">
                    <div class="bar active"></div><div class="bar active"></div><div class="bar active"></div><div class="bar"></div>
                </div>
                <div class="security-text">SECURITY STRENGTH: HIGH-IMPACT ENCRYPTION ACTIVE</div>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms" style="text-transform: none; color: var(--text-muted); letter-spacing: normal; margin-top: 0; font-weight: normal;">
                    I acknowledge the security protocols and agree to the <a href="#">Admin Terms of Service</a> and <a href="#">Privacy Framework</a>.
                </label>
            </div>
            
            <button type="submit">
                Create Account 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6a.996.996 0 10-1.41 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg>
            </button>
        </form>
        
        <div class="footer">
            <span class="logo">Presence</span>
            Already have administrative access? <a th:href="@{/login}">Sign In Here</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.textContent = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            }
        }

        // Apply saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').textContent = '🌙 Dark Mode';
        }
    </script>
</body>
</html>
