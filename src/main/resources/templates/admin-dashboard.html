<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <style>
        body { background: #eef2f5; padding-top: 2rem; padding-bottom: 2rem; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1200px; }
        #map { height: 400px; width: 100%; border-radius: 0 0 8px 8px; }
        .qr-code { max-width: 250px; height: auto; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
        .qr-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .stat-box { padding: 1.5rem; background: #f8f9fa; border-radius: 8px; text-align: center; height: 100%; }
        .stat-box.primary { border-bottom: 4px solid #0d6efd; }
        .stat-box.danger { border-bottom: 4px solid #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-center">Admin Dashboard - <span th:text="${activeSession.sessionName}">Session Name</span></h2>
    
    <div class="row g-4 mb-5">
        <!-- Stat Boxes -->
        <div class="col-md-4">
            <div class="stat-box">
                <h3 class="h5 text-muted">Total Scans</h3>
                <div class="h2 fw-bold" id="stat-total" th:text="${attendees.size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box primary">
                <h3 class="h5 text-muted">In Range (&le; 150m)</h3>
                <div class="h2 fw-bold text-primary" id="stat-inside" th:text="${attendees.?[withinRange].size()}">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-box danger">
                <h3 class="h5 text-muted">Out of Range (&gt; 150m)</h3>
                <div class="h2 fw-bold text-danger" id="stat-outside" th:text="${attendees.?[!withinRange].size()}">0</div>
            </div>
        </div>
    </div>

    <!-- Side-by-Side Section -->
    <div class="row g-4 mb-5">
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h5 class="mb-0 text-center fw-bold">Session QR Code</h5>
                </div>
                <div class="card-body qr-container">
                    <img class="qr-code mb-3 shadow-sm" th:src="'data:image/png;base64,' + ${qrCodeBase64}" alt="QR Code for Attendance"/>
                    <p class="text-muted small word-break mb-1">Scan to mark attendance, or visit:</p>
                    <a th:href="${attendeeUrl}" th:text="${attendeeUrl}" target="_blank" class="text-break">url</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h5 class="mb-0 text-center fw-bold">Live Map View</h5>
                </div>
                <div class="card-body p-0 d-flex flex-column">
                    <div id="map" class="flex-grow-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-light py-3 d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">Attendee Log</h5>
            <a th:href="@{/session/{id}/export-csv(id=${activeSession.id})}" class="btn btn-dark btn-sm fw-bold px-3 py-2">&#11123; Download CSV</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th th:if="${activeSession.activatedFields['Name'] != null}">Name</th>
                        <th th:if="${activeSession.activatedFields['RollNumber'] != null}">Roll Number</th>
                        <th th:if="${activeSession.activatedFields['Branch'] != null}">Branch</th>
                        <th th:if="${activeSession.activatedFields['Year'] != null}">Year</th>
                        <th>Status</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="attendee-table-body">
                    <!-- Populated via Thymeleaf initially, then JS -->
                    <tr th:each="attendee : ${attendees}">
                        <td th:if="${activeSession.activatedFields['Name'] != null}" th:text="${attendee.name}"></td>
                        <td th:if="${activeSession.activatedFields['RollNumber'] != null}" th:text="${attendee.rollNumber}"></td>
                        <td th:if="${activeSession.activatedFields['Branch'] != null}" th:text="${attendee.branch}"></td>
                        <td th:if="${activeSession.activatedFields['Year'] != null}" th:text="${attendee.year}"></td>
                        <td>
                            <span th:if="${attendee.withinRange}" class="badge bg-primary px-2 py-1">In Range</span>
                            <span th:if="${!attendee.withinRange}" class="badge bg-danger px-2 py-1">Out of Range</span>
                        </td>
                        <td th:text="${#temporals.format(attendee.markedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    </tr>
                    <tr th:if="${attendees.empty}" id="empty-row">
                        <td colspan="100%" class="text-center text-muted py-4">No attendees have scanned yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Leaflet JS CDN -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

<!-- Script Logic -->
<script th:inline="javascript">
/*<![CDATA[*/
    var sessionId = /*[[${activeSession.id}]]*/ '';
    var targetLat = /*[[${activeSession.targetLatitude}]]*/ 0;
    var targetLng = /*[[${activeSession.targetLongitude}]]*/ 0;
    var radius = /*[[${activeSession.allowedRadius}]]*/ 150;
    
    // Map setup
    var map = L.map('map').setView([targetLat, targetLng], 17);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Creator Marker (Blue)
    L.circleMarker([targetLat, targetLng], {
        radius: 8,
        fillColor: "#000",
        color: "#0a58ca",
        weight: 3,
        opacity: 1,
        fillOpacity: 1
    }).bindPopup("<b>Creator Location</b>").addTo(map);

    // 150m Blue Transparent Geofence
    L.circle([targetLat, targetLng], {
        color: '#0d6efd',
        fillColor: '#0a58ca',
        fillOpacity: 0.15,
        weight: 2,
        radius: radius
    }).addTo(map);

    var markersLayer = L.layerGroup().addTo(map);

    function fetchAndUpdate() {
        if (!sessionId) return;
        fetch('/session/' + sessionId + '/attendees-data')
            .then(response => response.json())
            .then(data => {
                markersLayer.clearLayers();
                
                let inRangeCount = 0;
                let outRangeCount = 0;

                data.forEach(function(att) {
                    if (att.capturedLatitude != null && att.capturedLongitude != null) {
                        // Spring/Jackson might serialize field as 'withinRange' 
                        let isInside = att.withinRange !== undefined ? att.withinRange : att.isWithinRange;
                        
                        if (isInside) inRangeCount++; else outRangeCount++;
                        
                        // Blue marker if <= 150m, Red if > 150m
                        let markerColor = isInside ? "#0d6efd" : "#dc3545"; 
                        let ident = att.name ? att.name : (att.rollNumber ? att.rollNumber : 'Unknown');

                        L.circleMarker([att.capturedLatitude, att.capturedLongitude], {
                            radius: 8,
                            fillColor: markerColor,
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        }).bindPopup("<b>" + ident + "</b><br>" + (isInside ? "In Range" : "Out of Range")).addTo(markersLayer);
                    }
                });

                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-inside').innerText = inRangeCount;
                document.getElementById('stat-outside').innerText = outRangeCount;
            }).catch(e => console.error("Auto Refresh Error:", e));
    }

    // Auto refresh every 5 seconds to track attendees dynamically
    setInterval(fetchAndUpdate, 5000);
/*]]>*/
</script>

</body>
</html>
