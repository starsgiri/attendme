<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance Marked - Presence</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Default Dark Theme */
            --bg-main: #0B1120;
            --bg-card: #151C2C;
            --border-color: #222B40;
            --text-main: #FFFFFF;
            --text-muted: #8B9BB4;
            --accent-blue: #6366F1;
            --success-green: #4ade80;
            --success-bg: rgba(74, 222, 128, 0.1);
            --error-red: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        :root.light-mode {
            /* Light Theme */
            --bg-main: #F4F6F8;
            --bg-card: #FFFFFF;
            --border-color: #E5E7EB;
            --text-main: #111827;
            --text-muted: #6B7280;
            --accent-blue: #4F46E5;
            --success-green: #10B981;
            --success-bg: #D1FAE5;
            --error-red: #EF4444;
            --error-bg: #FEE2E2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; transition: background-color 0.3s, color 0.3s; }

        .brand-logo { font-size: 24px; font-weight: 900; color: var(--accent-blue); letter-spacing: -0.5px; position: absolute; top: 32px; left: 32px; }

        .form-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; transition: background-color 0.3s, border-color 0.3s; }
        
        .icon-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
        .icon-circle.success { background-color: var(--success-bg); color: var(--success-green); border: 1px solid rgba(74, 222, 128, 0.2); }
        .icon-circle.error { background-color: var(--error-bg); color: var(--error-red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .icon-circle svg { width: 40px; height: 40px; fill: currentColor; }
        
        .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
        .title.success { color: var(--success-green); }
        .title.error { color: var(--error-red); }

        .subtitle { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }

        .close-btn { width: 100%; background-color: var(--border-color); color: var(--text-main); border: none; border-radius: 12px; padding: 16px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .close-btn:hover { filter: brightness(1.2); }
        
        .footer-note { text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-muted); }
        .footer-note svg { width: 12px; height: 12px; fill: currentColor; vertical-align: middle; margin-right: 4px; }

    </style>
</head>
<body>
    <div class="brand-logo">Presence</div>

    <div class="form-card" th:if="${isWithinRange}">
        <div class="icon-circle success">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1 class="title success">Success</h1>
        <p class="subtitle" th:text="${successMessage}">Record successfully added.</p>
        <p class="subtitle">Your attendance has been verified dynamically. You may now close this window safely.</p>
        <button class="close-btn" onclick="window.close();">You can close this tab</button>
    </div>

    <div class="form-card" th:if="${!isWithinRange}">
        <div class="icon-circle error">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
        <h1 class="title error">Out of Range</h1>
        <p class="subtitle">Your location indicates you are outside of the designated geofence area. Attendance could not be verified.</p>
        <button class="close-btn" onclick="history.back();">Go Back & Try Again</button>
    </div>

    <div class="footer-note">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        Secured by Geofencing Technology
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.add('light-mode');
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                // optional fallback to system theme
                document.documentElement.classList.add('light-mode');
            }
        });
    </script>
</body>
</html>
