<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create New Attendance Session</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f7f9fc; }
        .container { max-width: 500px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 0.5rem; }
        .checkbox-group input { margin-right: 0.5rem; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        button:hover { background-color: #0056b3; }
        .coords { display: flex; gap: 10px; }
        .coords .form-group { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>Create New Attendance Session</h2>
    <form action="/session" method="post">
        
        <div class="form-group">
            <label for="sessionName">Class/Event Name:</label>
            <input type="text" id="sessionName" name="sessionName" required placeholder="E.g. Computer Science 101">
        </div>

        <div class="form-group">
            <label>Required Attendee Information:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="field_name" name="activeFields" value="Name" checked>
                <label for="field_name">Full Name</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="field_roll" name="activeFields" value="RollNumber" checked>
                <label for="field_roll">Roll Number / ID</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="field_branch" name="activeFields" value="Branch">
                <label for="field_branch">Branch / Department</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="field_year" name="activeFields" value="Year">
                <label for="field_year">Year of Study</label>
            </div>
        </div>

        <div class="form-group">
            <label>Geofencing Configuration</label>
            <button type="button" onclick="getLocation()" style="margin-bottom: 10px; background-color: #28a745;">Set Current Location as Target</button>
            <div class="coords">
                <div class="form-group">
                    <label for="targetLatitude">Latitude</label>
                    <input type="number" step="any" id="targetLatitude" name="targetLatitude" required>
                </div>
                <div class="form-group">
                    <label for="targetLongitude">Longitude</label>
                    <input type="number" step="any" id="targetLongitude" name="targetLongitude" required>
                </div>
            </div>
            <div class="form-group">
                <label for="allowedRadius">Allowed Radius (meters)</label>
                <input type="number" id="allowedRadius" name="allowedRadius" value="150" required>
            </div>
        </div>

        <button type="submit">Create & Generate QR</button>
    </form>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById('targetLatitude').value = position.coords.latitude;
            document.getElementById('targetLongitude').value = position.coords.longitude;
        }, function(error) {
            alert('Error getting location: ' + error.message);
        });
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}
</script>

</body>
</html>
